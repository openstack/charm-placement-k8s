bundle: kubernetes
series: jammy

applications:

  mysql:
    charm: ch:mysql-k8s
    channel: edge
    scale: 1
    trust: false
    series: focal

  traefik:
    charm: ch:traefik-k8s
    channel: 1.0/stable
    scale: 1
    trust: true
    series: focal

  rabbitmq:
    charm: ch:rabbitmq-k8s
    channel: 3.9/edge
    scale: 1
    trust: true

  keystone:
    charm: ch:keystone-k8s
    channel: xena/edge
    scale: 1
    trust: true
    options:
      admin-role: admin
    storage:
      fernet-keys: 5M
      credential-keys: 5M

  nova:
    charm: ch:nova-k8s
    channel: xena/edge
    scale: 1
    trust: true

  placement:
    charm: ../../placement-k8s.charm
    scale: 1
    trust: true
    resources:
      placement-api-image: docker.io/kolla/ubuntu-binary-placement-api:xena

relations:
- - traefik:ingress
  - keystone:ingress-public

- - mysql:database
  - keystone:database

- - mysql:database
  - nova:database
- - mysql:database
  - nova:api-database
- - mysql:database
  - nova:cell-database
- - rabbitmq:amqp
  - nova:amqp
- - keystone:identity-service
  - nova:identity-service
- - traefik:ingress
  - nova:ingress-public

- - mysql:database
  - placement:database
- - keystone:identity-service
  - placement:identity-service
- - traefik:ingress
  - placement:ingress-public
